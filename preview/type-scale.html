<!DOCTYPE html><html lang="en"><head><meta charset="utf-8"><link rel="stylesheet" href="../colors_and_type.css">
<style>
  body{margin:0;background:var(--paper);padding:24px 32px;font-family:var(--font-sans);}
  table{border-collapse:collapse;width:100%;}
  td{padding:7px 0;border-bottom:1px solid var(--hairline);vertical-align:baseline;}
  .name{font-family:var(--font-mono);font-size:11px;color:var(--text-faint);width:80px;}
  .px{font-family:var(--font-mono);font-size:11px;color:var(--text-muted);width:96px;}
  .spec{color:var(--ink-800);line-height:1.1;white-space:nowrap;overflow:hidden;text-overflow:ellipsis;}
  tr:last-child td{border-bottom:none;}
</style></head>
<body>
  <table>
    <tr><td class="name">4xl</td><td class="px">60 · serif</td><td class="spec" style="font-family:var(--font-serif);font-size:34px;font-weight:700;letter-spacing:-.02em;">Display</td></tr>
    <tr><td class="name">3xl</td><td class="px">48 · serif</td><td class="spec" style="font-family:var(--font-serif);font-size:30px;font-weight:700;letter-spacing:-.02em;">Heading one</td></tr>
    <tr><td class="name">2xl</td><td class="px">36 · serif</td><td class="spec" style="font-family:var(--font-serif);font-size:26px;font-weight:600;">Heading two</td></tr>
    <tr><td class="name">xl</td><td class="px">28 · serif</td><td class="spec" style="font-family:var(--font-serif);font-size:22px;font-weight:600;">Heading three</td></tr>
    <tr><td class="name">lg</td><td class="px">22 · sans</td><td class="spec" style="font-size:20px;font-weight:600;">Subheading</td></tr>
    <tr><td class="name">md</td><td class="px">18 · sans</td><td class="spec" style="font-size:18px;">Lead paragraph</td></tr>
    <tr><td class="name">base</td><td class="px">16 · sans</td><td class="spec" style="font-size:16px;">Body copy — the default</td></tr>
    <tr><td class="name">sm</td><td class="px">14 · sans</td><td class="spec" style="font-size:14px;color:var(--ink-600);">Secondary UI text</td></tr>
    <tr><td class="name">xs</td><td class="px">12 · sans</td><td class="spec" style="font-size:12px;letter-spacing:.08em;text-transform:uppercase;font-weight:600;color:var(--text-muted);">Eyebrow / label</td></tr>
  </table>
</body></html>
