<!DOCTYPE html><html lang="en"><head><meta charset="utf-8"><link rel="stylesheet" href="../colors_and_type.css">
<style>
  body{margin:0;background:var(--ink-50);padding:34px 32px;font-family:var(--font-sans);}
  .row{display:flex;gap:26px;align-items:center;justify-content:space-between;}
  .item{display:flex;flex-direction:column;align-items:center;gap:14px;}
  .box{width:90px;height:64px;background:var(--paper);border-radius:12px;}
  .n{font-size:12px;font-weight:600;color:var(--ink-800);}
</style></head>
<body>
  <div class="row">
    <div class="item"><div class="box" style="box-shadow:var(--shadow-xs);"></div><div class="n">xs</div></div>
    <div class="item"><div class="box" style="box-shadow:var(--shadow-sm);"></div><div class="n">sm</div></div>
    <div class="item"><div class="box" style="box-shadow:var(--shadow-md);"></div><div class="n">md</div></div>
    <div class="item"><div class="box" style="box-shadow:var(--shadow-lg);"></div><div class="n">lg</div></div>
    <div class="item"><div class="box" style="box-shadow:var(--shadow-xl);"></div><div class="n">xl</div></div>
  </div>
</body></html>
