<!DOCTYPE html><html lang="en"><head><meta charset="utf-8"><link rel="stylesheet" href="../colors_and_type.css">
<style>
  body{margin:0;background:var(--paper);padding:26px 32px;font-family:var(--font-sans);}
  .row{display:flex;gap:12px;align-items:center;margin-bottom:14px;flex-wrap:wrap;}
  .btn{display:inline-flex;align-items:center;gap:8px;font-family:var(--font-sans);font-weight:600;font-size:14px;border-radius:8px;padding:10px 18px;border:1.5px solid transparent;cursor:pointer;transition:all var(--dur) var(--ease-out);}
  .btn svg{width:16px;height:16px;}
  .primary{background:var(--primary);color:#fff;}
  .primary:hover{background:var(--primary-hover);}
  .secondary{background:var(--paper);color:var(--primary);border-color:var(--border-strong);}
  .secondary:hover{border-color:var(--primary);background:var(--blue-50);}
  .ghost{background:transparent;color:var(--primary);}
  .ghost:hover{background:var(--blue-50);}
  .success{background:var(--success);color:#fff;}
  .danger{background:var(--paper);color:var(--danger);border-color:var(--danger);}
  .sm{padding:7px 13px;font-size:13px;}
  .lg{padding:13px 24px;font-size:15px;}
  .disabled{background:var(--ink-100);color:var(--ink-400);cursor:not-allowed;}
</style></head>
<body>
  <div class="row">
    <button class="btn primary"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><polyline points="20 6 9 17 4 12"/></svg>Confirm booking</button>
    <button class="btn secondary">Change seat</button>
    <button class="btn ghost">Cancel</button>
    <button class="btn danger">Release seat</button>
  </div>
  <div class="row">
    <button class="btn primary lg">Book this space</button>
    <button class="btn primary">Default</button>
    <button class="btn primary sm">Small</button>
    <button class="btn success sm"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.4" stroke-linecap="round" stroke-linejoin="round"><polyline points="20 6 9 17 4 12"/></svg>Booked</button>
    <button class="btn disabled">Unavailable</button>
  </div>
</body></html>
