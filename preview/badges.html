<!DOCTYPE html><html lang="en"><head><meta charset="utf-8"><link rel="stylesheet" href="../colors_and_type.css">
<style>
  body{margin:0;background:var(--paper);padding:26px 32px;font-family:var(--font-sans);display:flex;flex-direction:column;gap:16px;}
  .row{display:flex;gap:10px;align-items:center;flex-wrap:wrap;}
  .pill{display:inline-flex;align-items:center;gap:6px;padding:4px 11px;border-radius:999px;font-size:12.5px;font-weight:600;}
  .dot{width:7px;height:7px;border-radius:50%;}
  .tag{display:inline-flex;align-items:center;gap:6px;padding:4px 10px;border-radius:6px;font-size:12px;font-weight:600;background:var(--ink-100);color:var(--ink-700);}
  .tag svg{width:13px;height:13px;}
</style></head>
<body>
  <div class="row">
    <span class="pill" style="background:var(--success-soft);color:var(--success);"><span class="dot" style="background:var(--success);"></span>148 free</span>
    <span class="pill" style="background:var(--warning-soft);color:var(--warning);"><span class="dot" style="background:var(--warning);"></span>Filling up</span>
    <span class="pill" style="background:var(--danger-soft);color:var(--danger);"><span class="dot" style="background:var(--danger);"></span>Full</span>
    <span class="pill" style="background:var(--accent-soft);color:var(--accent);"><span class="dot" style="background:var(--accent);"></span>Your booking</span>
    <span class="pill" style="background:var(--feature-soft);color:var(--feature);"><span class="dot" style="background:var(--feature);"></span>Bookable</span>
  </div>
  <div class="row">
    <span class="tag"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M9 18V5l12-2v13"/><circle cx="6" cy="18" r="3"/><circle cx="18" cy="16" r="3"/></svg>Silent</span>
    <span class="tag"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><rect x="2" y="3" width="20" height="14" rx="2"/><line x1="8" y1="21" x2="16" y2="21"/></svg>Has monitor</span>
    <span class="tag"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M18 8h1a4 4 0 0 1 0 8h-1"/><path d="M2 8h16v9a4 4 0 0 1-4 4H6a4 4 0 0 1-4-4Z"/><line x1="6" y1="2" x2="6" y2="4"/><line x1="10" y1="2" x2="10" y2="4"/><line x1="14" y1="2" x2="14" y2="4"/></svg>Near café</span>
    <span class="tag"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><rect x="2" y="7" width="20" height="14" rx="2"/><path d="M6 7V5a2 2 0 0 1 2-2h8a2 2 0 0 1 2 2v2"/></svg>Power socket</span>
    <span class="tag"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M5 12.55a11 11 0 0 1 14.08 0M1.42 9a16 16 0 0 1 21.16 0M8.53 16.11a6 6 0 0 1 6.95 0M12 20h.01"/></svg>Wi-Fi</span>
  </div>
</body></html>
