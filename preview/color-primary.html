<!DOCTYPE html><html lang="en"><head><meta charset="utf-8"><link rel="stylesheet" href="../colors_and_type.css">
<style>
  body{margin:0;background:var(--paper);padding:26px 32px;font-family:var(--font-sans);}
  .swatches{display:flex;gap:0;border-radius:12px;overflow:hidden;box-shadow:var(--shadow-sm);}
  .sw{flex:1;height:96px;display:flex;align-items:flex-end;padding:8px 10px;}
  .sw span{font-family:var(--font-mono);font-size:10px;font-weight:500;}
  .label{margin-top:14px;font-size:13px;color:var(--text-muted);}
  .label b{color:var(--ink-800);font-weight:600;}
</style></head>
<body>
  <div class="swatches">
    <div class="sw" style="background:#001d36;"><span style="color:#bcd8ec;">900</span></div>
    <div class="sw" style="background:#002a4d;"><span style="color:#bcd8ec;">800</span></div>
    <div class="sw" style="background:#003865;"><span style="color:#fff;">700 · Blue</span></div>
    <div class="sw" style="background:#0a4d80;"><span style="color:#fff;">600</span></div>
    <div class="sw" style="background:#0075B0;"><span style="color:#fff;">500 · Cobalt</span></div>
    <div class="sw" style="background:#4596c6;"><span style="color:#fff;">400</span></div>
    <div class="sw" style="background:#84b9da;"><span style="color:#00263f;">300</span></div>
    <div class="sw" style="background:#bcd8ec;"><span style="color:#00263f;">200</span></div>
    <div class="sw" style="background:#e3eef7;"><span style="color:#0a4d80;">100</span></div>
    <div class="sw" style="background:#f1f7fc;"><span style="color:#0a4d80;">50</span></div>
  </div>
  <div class="label"><b>Primary — University Blue</b> &nbsp;#003865 · PMS 2955 &nbsp;|&nbsp; Cobalt #0075B0 · PMS 307 — the brand's two anchor blues with a derived tint ramp.</div>
</body></html>
