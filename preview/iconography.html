<!DOCTYPE html><html lang="en"><head><meta charset="utf-8"><link rel="stylesheet" href="../colors_and_type.css">
<style>
  body{margin:0;background:var(--paper);padding:26px 32px;font-family:var(--font-sans);}
  .grid{display:grid;grid-template-columns:repeat(8,1fr);gap:16px 10px;}
  .ic{display:flex;flex-direction:column;align-items:center;gap:7px;color:var(--ink-700);}
  .ic svg{width:24px;height:24px;}
  .ic span{font-size:10px;color:var(--text-muted);}
  .note{margin-top:18px;font-size:12px;color:var(--text-muted);}
  .note b{color:var(--ink-800);font-weight:600;}
</style></head>
<body>
  <div class="grid" id="g"></div>
  <div class="note"><b>Lucide</b> — 1.75px stroke, round caps/joins. Outline style throughout; never mix filled icon sets. Emoji are not used in UI.</div>
  <script src="https://unpkg.com/lucide@latest/dist/umd/lucide.min.js"></script>
  <script>
    const names=['building-2','map-pin','armchair','calendar-check','clock','users','search','wifi','plug','volume-x','monitor','coffee','bookmark','check','bell','settings'];
    const g=document.getElementById('g');
    g.innerHTML=names.map(n=>`<div class="ic"><i data-lucide="${n}"></i><span>${n}</span></div>`).join('');
    lucide.createIcons();
  </script>
</body></html>
