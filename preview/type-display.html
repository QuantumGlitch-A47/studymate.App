<!DOCTYPE html><html lang="en"><head><meta charset="utf-8"><link rel="stylesheet" href="../colors_and_type.css">
<style>
  body{margin:0;background:var(--paper);padding:28px 32px;font-family:var(--font-sans);}
  .row{display:flex;align-items:baseline;gap:16px;margin-bottom:18px;}
  .tag{font-family:var(--font-mono);font-size:11px;color:var(--text-faint);width:118px;flex:none;letter-spacing:.02em;}
  .serif{font-family:var(--font-serif);color:var(--ink-900);letter-spacing:-.02em;line-height:1.05;}
</style></head>
<body>
  <div class="row"><span class="tag">Display · 60 / 700</span><span class="serif" style="font-size:60px;font-weight:700;">Find your seat</span></div>
  <div class="row"><span class="tag">H1 · 48 / 700</span><span class="serif" style="font-size:48px;font-weight:700;">Study spaces, booked</span></div>
  <div class="row"><span class="tag">H2 · 36 / 600</span><span class="serif" style="font-size:36px;font-weight:600;">University of Glasgow</span></div>
  <div class="row"><span class="tag">H3 · 28 / 600</span><span class="serif" style="font-size:28px;font-weight:600;">Level 3 — Quiet study</span></div>
</body></html>
