<!DOCTYPE html><html lang="en"><head><meta charset="utf-8"><link rel="stylesheet" href="../colors_and_type.css">
<style>
  body{margin:0;background:var(--paper);padding:30px 32px;font-family:var(--font-sans);}
  .row{display:flex;gap:22px;align-items:flex-end;}
  .item{display:flex;flex-direction:column;align-items:center;gap:10px;}
  .box{width:78px;height:78px;background:var(--blue-100);border:1.5px solid var(--accent);}
  .n{font-size:12px;font-weight:600;color:var(--ink-800);}
  .v{font-family:var(--font-mono);font-size:10px;color:var(--text-muted);}
</style></head>
<body>
  <div class="row">
    <div class="item"><div class="box" style="border-radius:4px;"></div><div class="n">xs</div><div class="v">4px</div></div>
    <div class="item"><div class="box" style="border-radius:6px;"></div><div class="n">sm</div><div class="v">6px</div></div>
    <div class="item"><div class="box" style="border-radius:10px;"></div><div class="n">md</div><div class="v">10px</div></div>
    <div class="item"><div class="box" style="border-radius:14px;"></div><div class="n">lg</div><div class="v">14px</div></div>
    <div class="item"><div class="box" style="border-radius:20px;"></div><div class="n">xl</div><div class="v">20px</div></div>
    <div class="item"><div class="box" style="border-radius:999px;"></div><div class="n">pill</div><div class="v">999px</div></div>
  </div>
</body></html>
