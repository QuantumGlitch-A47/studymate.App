<!DOCTYPE html><html lang="en"><head><meta charset="utf-8"><link rel="stylesheet" href="../colors_and_type.css">
<style>
  body{margin:0;background:var(--paper);padding:26px 32px;font-family:var(--font-sans);}
  .grid{display:grid;grid-template-columns:repeat(5,1fr);gap:14px;}
  .chip{border-radius:10px;overflow:hidden;box-shadow:var(--shadow-sm);}
  .fill{height:72px;}
  .meta{padding:8px 10px 10px;}
  .meta .n{font-size:13px;font-weight:600;color:var(--ink-800);}
  .meta .h{font-family:var(--font-mono);font-size:10px;color:var(--text-muted);margin-top:2px;}
</style></head>
<body>
  <div class="grid">
    <div class="chip"><div class="fill" style="background:#0075B0;"></div><div class="meta"><div class="n">Cobalt</div><div class="h">#0075B0</div></div></div>
    <div class="chip"><div class="fill" style="background:#006630;"></div><div class="meta"><div class="n">Leaf</div><div class="h">#006630</div></div></div>
    <div class="chip"><div class="fill" style="background:#9A3A06;"></div><div class="meta"><div class="n">Rust</div><div class="h">#9A3A06</div></div></div>
    <div class="chip"><div class="fill" style="background:#B30C00;"></div><div class="meta"><div class="n">Pillarbox</div><div class="h">#B30C00</div></div></div>
    <div class="chip"><div class="fill" style="background:#951272;"></div><div class="meta"><div class="n">Thistle</div><div class="h">#951272</div></div></div>
  </div>
</body></html>
