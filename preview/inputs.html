<!DOCTYPE html><html lang="en"><head><meta charset="utf-8"><link rel="stylesheet" href="../colors_and_type.css">
<style>
  body{margin:0;background:var(--paper);padding:24px 32px;font-family:var(--font-sans);}
  .grid{display:grid;grid-template-columns:1fr 1fr;gap:18px 24px;}
  .field label{display:block;font-size:13px;font-weight:600;color:var(--ink-700);margin-bottom:6px;}
  .input{display:flex;align-items:center;gap:9px;background:var(--paper);border:1.5px solid var(--border-strong);border-radius:8px;padding:10px 12px;}
  .input svg{width:17px;height:17px;color:var(--text-muted);flex:none;}
  .input input{border:0;outline:0;font-family:var(--font-sans);font-size:14px;color:var(--ink-800);width:100%;background:transparent;}
  .input.focus{border-color:var(--accent);box-shadow:var(--ring);}
  .input input::placeholder{color:var(--text-faint);}
  .select{justify-content:space-between;}
  .hint{font-size:12px;color:var(--text-muted);margin-top:5px;}
</style></head>
<body>
  <div class="grid">
    <div class="field"><label>Search buildings</label><div class="input"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><circle cx="11" cy="11" r="8"/><path d="m21 21-4.3-4.3"/></svg><input placeholder="Library, learning hub…"></div></div>
    <div class="field"><label>Focused (typing)</label><div class="input focus"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><rect x="3" y="4" width="18" height="18" rx="2"/><path d="M16 2v4M8 2v4M3 10h18"/></svg><input value="Wed 31 May"></div></div>
    <div class="field"><label>Level</label><div class="input select"><span style="font-size:14px;color:var(--ink-800);">Level 3 — Quiet study</span><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><polyline points="6 9 12 15 18 9"/></svg></div></div>
    <div class="field"><label>Group size</label><div class="input"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M16 21v-2a4 4 0 0 0-4-4H6a4 4 0 0 0-4 4v2"/><circle cx="9" cy="7" r="4"/><path d="M22 21v-2a4 4 0 0 0-3-3.87"/></svg><input value="1 person"></div><div class="hint">Up to 6 for group rooms</div></div>
  </div>
</body></html>
