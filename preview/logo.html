<!DOCTYPE html><html lang="en"><head><meta charset="utf-8"><link rel="stylesheet" href="../colors_and_type.css">
<style>
  body{margin:0;background:var(--paper);padding:30px 32px;font-family:var(--font-sans);display:flex;align-items:center;gap:40px;}
  .full{display:flex;align-items:center;gap:13px;}
  .mark{width:52px;height:52px;border-radius:12px;background:var(--primary);position:relative;flex:none;box-shadow:var(--shadow-sm);}
  .word{font-family:var(--font-serif);font-size:29px;font-weight:700;letter-spacing:-.02em;color:var(--primary);}
  .word .b{color:var(--accent);}
  img.m{height:56px;}
  .divider{width:1px;align-self:stretch;background:var(--hairline);}
  .caption{font-size:12px;color:var(--text-muted);margin-top:10px;}
</style></head>
<body>
  <div>
    <img class="m" src="../assets/logo-full.svg" alt="StudyMate">
    <div class="caption">Primary lockup · serif wordmark</div>
  </div>
  <div class="divider"></div>
  <div>
    <img src="../assets/logo-mark.svg" width="56" height="56" alt="StudyMate mark">
    <div class="caption">App mark · open book + bookmark</div>
  </div>
</body></html>
