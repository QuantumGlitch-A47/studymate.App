<!DOCTYPE html><html lang="en"><head><meta charset="utf-8"><link rel="stylesheet" href="../colors_and_type.css">
<style>
  body{margin:0;background:var(--paper);padding:24px 32px;font-family:var(--font-sans);}
  .row{display:flex;align-items:center;gap:14px;margin-bottom:9px;}
  .bar{height:16px;background:var(--accent);border-radius:3px;}
  .n{width:52px;font-family:var(--font-mono);font-size:11px;color:var(--ink-800);font-weight:500;}
  .v{font-family:var(--font-mono);font-size:11px;color:var(--text-muted);}
</style></head>
<body>
  <div class="row"><span class="n">1</span><div class="bar" style="width:4px;"></div><span class="v">4px</span></div>
  <div class="row"><span class="n">2</span><div class="bar" style="width:8px;"></div><span class="v">8px</span></div>
  <div class="row"><span class="n">3</span><div class="bar" style="width:12px;"></div><span class="v">12px</span></div>
  <div class="row"><span class="n">4</span><div class="bar" style="width:16px;"></div><span class="v">16px</span></div>
  <div class="row"><span class="n">5</span><div class="bar" style="width:24px;"></div><span class="v">24px</span></div>
  <div class="row"><span class="n">6</span><div class="bar" style="width:32px;"></div><span class="v">32px</span></div>
  <div class="row"><span class="n">7</span><div class="bar" style="width:48px;"></div><span class="v">48px</span></div>
  <div class="row"><span class="n">8</span><div class="bar" style="width:64px;"></div><span class="v">64px</span></div>
</body></html>
