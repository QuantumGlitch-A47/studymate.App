<!DOCTYPE html><html lang="en"><head><meta charset="utf-8"><link rel="stylesheet" href="../colors_and_type.css">
<style>
  body{margin:0;background:var(--paper);padding:26px 32px;font-family:var(--font-sans);}
  .swatches{display:flex;gap:0;border-radius:12px;overflow:hidden;box-shadow:var(--shadow-sm);border:1px solid var(--border);}
  .sw{flex:1;height:84px;display:flex;align-items:flex-end;padding:7px 8px;}
  .sw span{font-family:var(--font-mono);font-size:10px;font-weight:500;}
  .label{margin-top:14px;font-size:13px;color:var(--text-muted);}
  .label b{color:var(--ink-800);font-weight:600;}
</style></head>
<body>
  <div class="swatches">
    <div class="sw" style="background:#131a21;"><span style="color:#c3cad2;">900</span></div>
    <div class="sw" style="background:#1f2933;"><span style="color:#c3cad2;">800</span></div>
    <div class="sw" style="background:#34414c;"><span style="color:#dde2e8;">700</span></div>
    <div class="sw" style="background:#4d5a66;"><span style="color:#fff;">600</span></div>
    <div class="sw" style="background:#6b7785;"><span style="color:#fff;">500</span></div>
    <div class="sw" style="background:#919ca8;"><span style="color:#fff;">400</span></div>
    <div class="sw" style="background:#c3cad2;"><span style="color:#1f2933;">300</span></div>
    <div class="sw" style="background:#dde2e8;"><span style="color:#1f2933;">200</span></div>
    <div class="sw" style="background:#eef1f4;"><span style="color:#4d5a66;">100</span></div>
    <div class="sw" style="background:#f6f8fa;"><span style="color:#4d5a66;">50</span></div>
  </div>
  <div class="label"><b>Warm "paper &amp; ink" neutrals</b> — cool-warm balanced greys. <b>900</b> headings · <b>700</b> body · <b>500</b> muted · <b>200</b> borders · <b>50</b> app background.</div>
</body></html>
